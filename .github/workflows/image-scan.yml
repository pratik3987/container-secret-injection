name: Image Security Scan

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build images
        run: |
          docker build -f Dockerfile.webhook -t localhost/vault-webhook:latest .
          docker build -f Dockerfile.runner -t localhost/vault-runner:latest .
          docker build -f cmd/controller/Dockerfile -t localhost/vault-controller:latest .
      - name: Scan images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: |
            localhost/vault-webhook:latest
            localhost/vault-runner:latest
            localhost/vault-controller:latest
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
