name: Image Security Scan (Trivy)

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  trivy-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2
      - name: Build images
        run: |
          docker build -f Dockerfile.webhook -t vault-webhook:latest .
          docker build -f Dockerfile.runner -t vault-runner:latest .
          docker build -f cmd/controller/Dockerfile -t vault-controller:latest .
      - name: Save images as tar files
        run: |
          docker save vault-webhook:latest -o webhook.tar
          docker save vault-runner:latest -o runner.tar
          docker save vault-controller:latest -o controller.tar
      - name: Scan webhook image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: 'webhook.tar'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Scan runner image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: 'runner.tar'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Scan controller image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          input: 'controller.tar'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
