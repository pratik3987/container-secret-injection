name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v7
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.20'
      - name: Run gofmt
        run: gofmt -l . | tee /tmp/gofmt.txt && test -z "$(cat /tmp/gofmt.txt)"
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test ./... -v
      - name: Log in to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push images to GHCR
        uses: docker/build-push-action@v7
        with:
          push: true
          platforms: linux/amd64
          tags: |
            ghcr.io/${{ github.repository_owner }}/vault-webhook:webhook
            ghcr.io/${{ github.repository_owner }}/vault-webhook:runner
          files: |
            Dockerfile.webhook
            Dockerfile.runner
          build-args: |
            
      - name: Scan pushed images with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: |
            ghcr.io/${{ github.repository_owner }}/vault-webhook:webhook
            ghcr.io/${{ github.repository_owner }}/vault-webhook:runner
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
      - name: Lint Kubernetes manifests
        uses: instrumenta/kubectl@v1
        with:
          args: apply --dry-run=client -f k8s/
