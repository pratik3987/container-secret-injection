name: CI

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'
      - name: Generate controller code
        run: |
          go install sigs.k8s.io/controller-tools/cmd/controller-gen@v0.16.0
          /home/runner/go/bin/controller-gen object:headerFile="" paths="./api/..."
      - name: Run gofmt
        run: gofmt -l . | tee /tmp/gofmt.txt && test -z "$(cat /tmp/gofmt.txt)"
      - name: Run go vet
        run: go vet ./...
      - name: Run tests
        run: go test ./... -v
      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push webhook image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile.webhook
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/vault-webhook:latest
      - name: Build and push runner image
        uses: docker/build-push-action@v7
        with:
          file: Dockerfile.runner
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/vault-runner:latest
      - name: Build and push controller image
        uses: docker/build-push-action@v7
        with:
          file: cmd/controller/Dockerfile
          push: true
          platforms: linux/amd64
          tags: ghcr.io/${{ github.repository_owner }}/vault-controller:latest
          build-args: |
            
      - name: Set up kubectl
        uses: azure/setup-kubectl@v3
      - name: Lint Kubernetes manifests
        run: kubectl apply --dry-run=client -f k8s/
