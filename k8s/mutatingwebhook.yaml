apiVersion: admissionregistration.k8s.io/v1
kind: MutatingWebhookConfiguration
metadata:
  name: vault-webhook
webhooks:
  - name: vault.prtk.com
    clientConfig:
      service:
        name: vault-webhook
        namespace: default
        path: "/mutate"
      caBundle: "REPLACE_WITH_CA_BUNDLE"
    rules:
      - apiGroups: [""]
        apiVersions: ["v1"]
        operations: ["CREATE"]
        resources: ["pods"]
    admissionReviewVersions: ["v1"]
    sideEffects: None
