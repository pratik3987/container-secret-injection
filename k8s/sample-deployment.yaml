apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: sample-app
  template:
    metadata:
      labels:
        app: sample-app
      annotations:
        vault.prtk.com/inject: "true"
        vault.prtk.com/vault-addr: "https://vault.prtk.com:8200"
        vault.prtk.com/vault-path: "kv/data/app"
        vault.prtk.com/vault-role: "demo-role"
    spec:
      containers:
        - name: app
          image: busybox
          command: ["/bin/sh","-c","echo starting; sleep 3600"]
